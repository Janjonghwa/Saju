services:
  db:
    image: postgres:16
    container_name: saju-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: saju
      POSTGRES_USER: saju
      POSTGRES_PASSWORD: saju
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
